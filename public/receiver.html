<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NorthernLights Cast Receiver</title>
  <style>
    body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    cast-media-player { width: 100vw; height: 100vh; }
    #debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 33vh;
      background: rgba(0, 0, 0, 0.85);
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.4;
      padding: 6px 10px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 9999;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #debug-panel .err { color: #f44; }
    #debug-panel .warn { color: #ff0; }
    #debug-panel .ok { color: #0f0; }
  </style>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
</head>
<body>
  <cast-media-player></cast-media-player>
  <div id="debug-panel"></div>
  <script>
    const LOG_TAG = 'NorthernLights';
    const castDebugLogger = cast.debug.CastDebugLogger.getInstance();
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    let currentAuthToken = '';

    // ─── Custom Debug Panel ────────────────────────────────────────
    const panel = document.getElementById('debug-panel');
    const MAX_LINES = 80;

    function log(level, tag, msg) {
      const ts = ((performance.now() / 1000).toFixed(1));
      const cls = level === 'error' ? 'err' : level === 'warn' ? 'warn' : 'ok';
      const line = document.createElement('div');
      line.className = cls;
      line.textContent = `[${ts}s] [${tag}] ${msg}`;
      panel.appendChild(line);
      // Trim old lines
      while (panel.children.length > MAX_LINES) {
        panel.removeChild(panel.firstChild);
      }
      panel.scrollTop = panel.scrollHeight;
      // Also log to CaC Tool
      if (level === 'error') castDebugLogger.error(tag, msg);
      else if (level === 'warn') castDebugLogger.warn(tag, msg);
      else castDebugLogger.info(tag, msg);
    }

    // ─── Receiver Init ─────────────────────────────────────────────
    context.addEventListener(cast.framework.system.EventType.READY, () => {
      // Disable default debug overlay — we use our own panel
      castDebugLogger.setEnabled(false);
      log('ok', LOG_TAG, 'Receiver started and ready');
    });

    // Log errors
    context.addEventListener(cast.framework.system.EventType.ERROR, (e) => {
      log('error', LOG_TAG, 'Receiver error: ' + JSON.stringify(e));
    });

    // ─── LOAD Interceptor ──────────────────────────────────────────
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      loadRequestData => {
        if (loadRequestData.media) {
          const m = loadRequestData.media;
          log('ok', LOG_TAG, 'LOAD contentId: ' + m.contentId);
          log('ok', LOG_TAG, 'LOAD contentType: ' + m.contentType);
          log('ok', LOG_TAG, 'LOAD customData: ' + JSON.stringify(m.customData));

          m.contentType = m.contentType || 'application/vnd.apple.mpegurl';

          if (m.customData && m.customData.token) {
            currentAuthToken = m.customData.token;
            log('ok', LOG_TAG, 'Auth token set (' + currentAuthToken.length + ' chars)');
          } else {
            currentAuthToken = '';
            log('warn', LOG_TAG, 'No auth token in customData');
          }
        }
        return loadRequestData;
      }
    );

    // Log player errors with details
    playerManager.addEventListener(
      cast.framework.events.EventType.ERROR,
      (e) => {
        log('error', LOG_TAG, 'Player error: ' + JSON.stringify(e));
      }
    );

    // Log media status changes
    playerManager.addEventListener(
      cast.framework.events.EventType.MEDIA_STATUS,
      (e) => {
        if (e.mediaStatus) {
          log('ok', LOG_TAG, 'State: ' + e.mediaStatus.playerState +
            (e.mediaStatus.idleReason ? ' (' + e.mediaStatus.idleReason + ')' : ''));
        }
      }
    );

    // ─── Shaka Network Config ──────────────────────────────────────
    const playbackConfig = new cast.framework.PlaybackConfig();
    playbackConfig.segmentRequestHandler = requestInfo => {
      if (currentAuthToken) {
        requestInfo.headers = requestInfo.headers || {};
        requestInfo.headers['Authorization'] = 'Bearer ' + currentAuthToken;
      }
    };
    playbackConfig.manifestRequestHandler = requestInfo => {
      if (currentAuthToken) {
        requestInfo.headers = requestInfo.headers || {};
        requestInfo.headers['Authorization'] = 'Bearer ' + currentAuthToken;
      }
    };

    context.start({ playbackConfig: playbackConfig });
  </script>
</body>
</html>
