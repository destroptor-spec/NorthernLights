<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NorthernLights Cast Receiver</title>
  <style>
    body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    cast-media-player { width: 100vw; height: 100vh; }
    #debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 33vh;
      background: rgba(0, 0, 0, 0.85);
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.4;
      padding: 6px 10px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 9999;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #debug-panel .err { color: #f44; }
    #debug-panel .warn { color: #ff0; }
    #debug-panel .ok { color: #0f0; }
  </style>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
</head>
<body>
  <cast-media-player></cast-media-player>
  <div id="debug-panel"></div>
  <script>
    var LOG_TAG = 'NorthernLights';

    // Safe debug logger — receiver works even if caf_receiver_logger.js fails to load
    var castDebugLogger = null;
    try {
      castDebugLogger = cast.debug.CastDebugLogger.getInstance();
    } catch (e) {
      // Debug logger unavailable — CaC Tool logging disabled, receiver still works
    }

    var context = cast.framework.CastReceiverContext.getInstance();
    var playerManager = context.getPlayerManager();
    var currentAuthToken = '';

    // ─── Codec Detection via canDisplayType() ───────────────────────
    var CODEC_PROBES = [
      { codec: 'eac3',   mime: 'audio/mp4',  codecs: 'ec-3' },
      { codec: 'ac3',    mime: 'audio/mp4',  codecs: 'ac-3' },
      { codec: 'aac_he', mime: 'audio/mp4',  codecs: 'mp4a.40.5' },
      { codec: 'aac',    mime: 'audio/mp4',  codecs: 'mp4a.40.2' },
      { codec: 'mp3',    mime: 'audio/mpeg', codecs: '' },
    ];

    var bestCodec = 'aac'; // universal fallback
    for (var i = 0; i < CODEC_PROBES.length; i++) {
      var c = CODEC_PROBES[i];
      try {
        if (context.canDisplayType(c.mime, c.codecs)) {
          bestCodec = c.codec;
          break; // first match = highest priority
        }
      } catch (e) {
        // canDisplayType may throw for unknown types — skip
      }
    }

    // ─── Custom Debug Panel ────────────────────────────────────────
    var panel = document.getElementById('debug-panel');
    var MAX_LINES = 80;

    function log(level, tag, msg) {
      var ts = ((performance.now() / 1000).toFixed(1));
      var cls = level === 'error' ? 'err' : level === 'warn' ? 'warn' : 'ok';
      var line = document.createElement('div');
      line.className = cls;
      line.textContent = '[' + ts + 's] [' + tag + '] ' + msg;
      panel.appendChild(line);
      while (panel.children.length > MAX_LINES) {
        panel.removeChild(panel.firstChild);
      }
      panel.scrollTop = panel.scrollHeight;
      // Log to CaC Tool only if debug logger loaded
      if (castDebugLogger) {
        if (level === 'error') castDebugLogger.error(tag, msg);
        else if (level === 'warn') castDebugLogger.warn(tag, msg);
        else castDebugLogger.info(tag, msg);
      }
    }

    // ─── Receiver Init ─────────────────────────────────────────────
    context.addEventListener(cast.framework.system.EventType.READY, function() {
      log('ok', LOG_TAG, 'Receiver started — best codec: ' + bestCodec);
    });

    context.addEventListener(cast.framework.system.EventType.ERROR, function(e) {
      log('error', LOG_TAG, 'Receiver error: ' + JSON.stringify(e));
    });

    // ─── LOAD Interceptor ──────────────────────────────────────────
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      function(loadRequestData) {
        if (loadRequestData.media) {
          var m = loadRequestData.media;

          // Inject codec parameter into contentId URL
          if (m.contentId) {
            try {
              var urlObj = new URL(m.contentId);
              if (!urlObj.searchParams.has('codec')) {
                urlObj.searchParams.set('codec', bestCodec);
                m.contentId = urlObj.toString();
                log('ok', LOG_TAG, 'Injected codec: ' + bestCodec);
              }
            } catch (e) {
              log('error', LOG_TAG, 'Failed to parse contentId URL');
            }
          }

          log('ok', LOG_TAG, 'LOAD contentId: ' + m.contentId);
          log('ok', LOG_TAG, 'LOAD contentType: ' + m.contentType);
          log('ok', LOG_TAG, 'LOAD customData: ' + JSON.stringify(m.customData));

          m.contentType = m.contentType || 'application/vnd.apple.mpegurl';

          if (m.customData && m.customData.token) {
            currentAuthToken = m.customData.token;
            log('ok', LOG_TAG, 'Auth token set (' + currentAuthToken.length + ' chars)');
          } else {
            currentAuthToken = '';
            log('warn', LOG_TAG, 'No auth token in customData');
          }
        }
        return loadRequestData;
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.ERROR,
      function(e) {
        var detail = '';
        if (e.detailedErrorCode) detail += ' code=' + e.detailedErrorCode;
        if (e.error) {
          detail += ' error=' + JSON.stringify(e.error);
          if (e.error.data) detail += ' data=' + JSON.stringify(e.error.data);
          if (e.error.code) detail += ' shakaCode=' + e.error.code;
          if (e.error.category) detail += ' category=' + e.error.category;
        }
        log('error', LOG_TAG, 'Player error:' + detail);
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.BUFFERING,
      function(e) {
        log('ok', LOG_TAG, 'Buffering: ' + e.bufferingType);
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.MEDIA_STATUS,
      function(e) {
        if (e.mediaStatus) {
          log('ok', LOG_TAG, 'State: ' + e.mediaStatus.playerState +
            (e.mediaStatus.idleReason ? ' (' + e.mediaStatus.idleReason + ')' : ''));
        }
      }
    );

    // ─── Shaka Network Config ──────────────────────────────────────
    var playbackConfig = new cast.framework.PlaybackConfig();
    playbackConfig.segmentRequestHandler = function(requestInfo) {
      log('ok', LOG_TAG, 'Segment: ' + (requestInfo.url || '').substring(0, 60) + '...');
      if (currentAuthToken) {
        requestInfo.headers = requestInfo.headers || {};
        requestInfo.headers['Authorization'] = 'Bearer ' + currentAuthToken;
      }
    };
    playbackConfig.manifestRequestHandler = function(requestInfo) {
      log('ok', LOG_TAG, 'Manifest: ' + (requestInfo.url || '').substring(0, 80));
      if (currentAuthToken) {
        requestInfo.headers = requestInfo.headers || {};
        requestInfo.headers['Authorization'] = 'Bearer ' + currentAuthToken;
      }
    };

    context.start({ playbackConfig: playbackConfig });
  </script>
</body>
</html>
