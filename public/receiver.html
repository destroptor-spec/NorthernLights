<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NorthernLights Cast Receiver</title>
  <style>
    body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    cast-media-player { width: 100vw; height: 100vh; }
  </style>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <cast-media-player></cast-media-player>
  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    let currentAuthToken = '';

    // Intercept LOAD to extract auth token from customData and force HLS MIME type
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      loadRequestData => {
        if (loadRequestData.media) {
          loadRequestData.media.contentType =
            loadRequestData.media.contentType || 'application/vnd.apple.mpegurl';

          // Extract auth token passed via customData from the sender
          if (loadRequestData.media.customData && loadRequestData.media.customData.token) {
            currentAuthToken = loadRequestData.media.customData.token;
          } else {
            currentAuthToken = '';
          }
        }
        return loadRequestData;
      }
    );

    // Configure Shaka Player network layer to inject Bearer auth on segment requests
    const playbackConfig = new cast.framework.PlaybackConfig();
    playbackConfig.segmentRequestHandler = requestInfo => {
      if (currentAuthToken) {
        requestInfo.headers = requestInfo.headers || {};
        requestInfo.headers['Authorization'] = 'Bearer ' + currentAuthToken;
      }
    };
    playbackConfig.manifestRequestHandler = requestInfo => {
      if (currentAuthToken) {
        requestInfo.headers = requestInfo.headers || {};
        requestInfo.headers['Authorization'] = 'Bearer ' + currentAuthToken;
      }
    };

    context.start({ playbackConfig: playbackConfig });
  </script>
</body>
</html>
